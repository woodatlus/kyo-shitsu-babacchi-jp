<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
<title>お問い合わせありがとうございます - 横須賀ピアノ教室</title>
<link type="image/png" href="/assets/images/fviconD-1.png" rel="apple-touch-icon">
<link type="image/png" href="/assets/images/fviconD-1.png" rel="icon">
<link rel="stylesheet" href="/assets/css/themify-2588729680.css">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  background: #fff;
  color: #333;
}
#headerwrap {
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.05);
  padding: 0;
}
#header {
  max-width: 1100px;
  margin: 0 auto;
  padding: 15px 20px;
  box-sizing: border-box;
}
#site-logo {
  font-size: 1.7em;
  font-weight: 700;
  letter-spacing: -.04em;
}
#site-logo a {
  color: inherit;
  text-decoration: none;
}
.thankyou-wrap {
  max-width: 700px;
  margin: 80px auto;
  padding: 60px 40px;
  text-align: center;
  border: 1px solid #eee;
  border-radius: 8px;
  box-sizing: border-box;
}
.thankyou-wrap h1 {
  font-size: 1.8em;
  margin-bottom: 20px;
  color: #333;
}
.thankyou-wrap p {
  font-size: 1.05em;
  line-height: 1.8;
  color: #555;
  margin-bottom: 30px;
}
.back-btn {
  display: inline-block;
  padding: 12px 32px;
  background: #000;
  color: #fff;
  text-decoration: none;
  border-radius: 4px;
  font-size: 0.95em;
  transition: background 0.2s;
}
.back-btn:hover {
  background: #333;
}
#footerwrap {
  background: #f5f5f5;
  text-align: center;
  padding: 20px;
  font-size: 0.85em;
  color: #888;
  margin-top: 60px;
}
</style>
</head>
<body>
<div id="headerwrap">
  <header id="header">
    <div id="site-logo"><a href="/" title="横須賀ピアノ教室">横須賀ピアノ教室</a></div>
  </header>
</div>

<div class="thankyou-wrap">
  <h1>お問い合わせありがとうございます</h1>
  <p>
    お問い合わせを受け付けました。<br>
    内容を確認のうえ、担当者よりご連絡いたします。<br>
    しばらくお待ちください。
  </p>
  <a href="/" class="back-btn">トップページへ戻る</a>
</div>

<div id="footerwrap">
  <p>&copy; 横須賀ばばっちピアノ</p>
</div>
</body>
</html>
